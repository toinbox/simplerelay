services:
  relay:
    build: .
    environment:
      - TZ=Europe/Prague
    ports:
      - "2525:2525"
      - "8580:8080"
    volumes:
      - ./data/relay:/data
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-simplerelay}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
